version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lokify-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lokify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - lokify-postgres-data:/var/lib/postgresql/data

volumes:
  lokify-postgres-data:

